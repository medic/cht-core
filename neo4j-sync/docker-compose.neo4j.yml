# Standalone docker-compose for local development of Neo4j sync.
# Usage: docker-compose -f neo4j-sync/docker-compose.neo4j.yml up
#
# Expects COUCH_URL to point at your running CouchDB instance.
# Example: COUCH_URL=http://admin:pass@host.docker.internal:5984/medic

services:
  neo4j:
    image: neo4j:5-community
    hostname: neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}
    volumes:
      - neo4j-data:/data
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    deploy:
      resources:
        limits:
          memory: 2G

  neo4j-sync:
    build: .
    depends_on:
      - neo4j
    environment:
      - COUCH_URL=${COUCH_URL:?COUCH_URL must be set}
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4jpassword}

volumes:
  neo4j-data:
