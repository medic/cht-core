{{- if not .Values.couchdb.clusteredCouchEnabled }}
apiVersion: v1
kind: Service
metadata:
  labels:
    cht.service: couchdb
  name: couchdb
spec:
{{- include "couchdb.servicePorts" dict | nindent 2 }}
  selector:
    cht.service: couchdb
status:
  loadBalancer: {}
{{- end }}

{{- if .Values.couchdb.clusteredCouchEnabled }}
{{- range $i, $e := until (int .Values.clusteredCouch.noOfCouchDBNodes) }}
{{ $nodeNumber := add $i 1 }}
apiVersion: v1
kind: Service
metadata:
  labels:
    cht.service: couchdb-{{ $nodeNumber }}
  name: couchdb-{{ $nodeNumber }}
spec:
{{- include "couchdb.servicePorts" (dict "nodeNumber" $nodeNumber) | nindent 2 }}
  selector:
    cht.service: couchdb-{{ $nodeNumber }}
status:
  loadBalancer: {}
--- #Don't remove the separator. We need this to separate yamls generated by the range command.
{{- end }}
{{- end }}
