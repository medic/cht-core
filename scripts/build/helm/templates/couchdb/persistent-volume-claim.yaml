{{- if and (not .Values.couchdb.clusteredCouchEnabled) (or (eq (toString .Values.cluster_type) "eks") (eq (toString .Values.cluster_type) "gke") (eq (toString .Values.cluster_type) "k3s-k3d")) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    cht.service: couchdb-claim0
  name: couchdb-claim0
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.couchdb.couchdb_node_storage_size }}
{{- include "couchdb.pvcStorageClass" (dict "cluster_type" .Values.cluster_type "couchdb_data" .Values.couchdb_data "namespace" .Values.namespace "couchdb" .Values.couchdb) | nindent 2 }}
status: {}
{{- end }}

{{- if $.Values.couchdb.clusteredCouchEnabled }}
{{- range $i, $e := until (int $.Values.clusteredCouch.noOfCouchDBNodes) }}
{{ $nodeNumber := add $i 1 }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    cht.service: couchdb-{{ $nodeNumber }}-claim0
  name: couchdb-{{ $nodeNumber }}-claim0
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $.Values.couchdb.couchdb_node_storage_size }}
{{- include "couchdb.pvcStorageClass" (dict "cluster_type" $.Values.cluster_type "couchdb_data" $.Values.couchdb_data "namespace" $.Values.namespace "couchdb" $.Values.couchdb "nodeNumber" $nodeNumber) | nindent 2 }}
status: {}
--- #Don't remove the separator. We need this to separate yamls generated by the range command.
{{- end }}
{{- end }}
