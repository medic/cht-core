{{- if not .Values.couchdb.clusteredCouchEnabled }}
apiVersion: v1
kind: Service
metadata:
  labels:
    cht.service: nouveau
  name: nouveau
spec:
  ports:
    - name: nouveau-service
      port: 5987
      protocol: TCP
      targetPort: 5987
  selector:
    cht.service: couchdb
status:
  loadBalancer: {}
{{- end }}

{{- if .Values.couchdb.clusteredCouchEnabled }}
{{- range $i, $e := until (int .Values.clusteredCouch.noOfCouchDBNodes) }}
{{ $nodeNumber := add $i 1 }}
apiVersion: v1
kind: Service
metadata:
  labels:
    cht.service: nouveau-{{ $nodeNumber }}
  name: nouveau-{{ $nodeNumber }}
spec:
  ports:
    - name: nouveau-service
      port: 5987
      protocol: TCP
      targetPort: 5987
  selector:
    cht.service: couchdb-{{ $nodeNumber }}
status:
  loadBalancer: {}
--- #Don't remove the separator. We need this to separate yamls generated by the range command.
{{- end }}
{{- end }}
